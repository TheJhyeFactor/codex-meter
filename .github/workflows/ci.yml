name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Parser checks and debug build
        env:
          SKIP_LIVE_CODEX_CHECK: "1"
        run: ./scripts/test.sh
      - name: Build universal app
        run: ./scripts/build-app.sh dist
      - name: Verify architectures and signature
        run: |
          file "dist/Codex Meter.app/Contents/MacOS/CodexMeter"
          lipo "dist/Codex Meter.app/Contents/MacOS/CodexMeter" -verify_arch arm64 x86_64
          lipo "dist/codex-meter" -verify_arch arm64 x86_64
          codesign --verify --deep --strict "dist/Codex Meter.app"
          codesign --verify --strict "dist/codex-meter"
          "dist/codex-meter" --help
